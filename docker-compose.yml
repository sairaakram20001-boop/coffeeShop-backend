version: "3.9"

services:
  # ── SQL Server ──────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coffeeshop_sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Password123"   # Change this!
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa",
             "-P", "YourStrong@Password123",
             "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ASP.NET API ─────────────────────────────
  api:
    build: .
    container_name: coffeeshop_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # Override appsettings connection string for Docker networking
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;
        Database=CoffeeShopDB;
        User Id=sa;
        Password=YourStrong@Password123;
        TrustServerCertificate=True;
        Encrypt=False;
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:
